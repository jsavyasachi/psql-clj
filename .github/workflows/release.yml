name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
          restore-keys: ${{ runner.os }}-m2-
      - name: Verify every project.clj matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for p in project.clj modules/gis/project.clj modules/aws/project.clj; do
            PROJ=$(sed -n '1s/[^"]*"\([0-9][^"]*\)".*/\1/p' "$p")
            echo "$p = $PROJ (tag $TAG)"
            [ "$PROJ" = "$TAG" ] || { echo "::error::$p version $PROJ != tag $TAG"; exit 1; }
          done
      - name: core - test, install, deploy
        run: |
          lein test
          lein install
          lein deploy clojars
      - name: gis - test, deploy
        working-directory: modules/gis
        run: |
          lein test
          lein deploy clojars
      - name: aws - test, deploy
        working-directory: modules/aws
        run: |
          lein test
          lein deploy clojars
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
