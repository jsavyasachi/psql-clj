name: release

# Publishes to Clojars when a v* tag is pushed. The tag is the deliberate
# "this is worth a release" signal; nothing publishes on ordinary commits.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # manual run for testing (skips the tag-version guard)

permissions:
  contents: write          # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Verify tag matches build.clj version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJ=$(sed -n 's/.*def version "\([^"]*\)".*/\1/p' build.clj)
          echo "tag=$TAG build.clj=$PROJ"
          if [ "$TAG" != "$PROJ" ]; then
            echo "::error::tag v$TAG does not match build.clj version $PROJ"
            exit 1
          fi

      - name: Verify README install coordinate matches version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          LIB=$(grep -oE "net\.clojars\.[^ ')]+" build.clj | head -1)
          if ! grep -qF "$LIB {:mvn/version \"$TAG\"}" README.md; then
            echo "::error::README.md is missing install coordinate: $LIB {:mvn/version \"$TAG\"}"
            exit 1
          fi

      - name: Test
        run: clojure -M:test

      # 3-artifact release. Companions declare a :mvn/version dep on core, so core
      # is always installed to ~/.m2 first (companions resolve it). Clojars is
      # immutable: redeploying an already-published non-SNAPSHOT version 403s. So
      # each artifact is deployed only when its build.clj version is not yet on
      # Clojars - a core-only bump, a companion-only bump, and re-running the same
      # tag are all idempotent and stay green instead of failing on a redeploy.
      - name: Deploy core + companions to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: |
          set -euo pipefail

          deploy_if_new () {
            local artifact="$1" dir="$2" ver url code
            ver=$(sed -n 's/.*def version "\([^"]*\)".*/\1/p' "$dir/build.clj")
            url="https://repo.clojars.org/net/clojars/savya/${artifact}/${ver}/${artifact}-${ver}.jar"
            code=$(curl -fsS -o /dev/null -w '%{http_code}' "$url" || true)
            if [ "$code" = "200" ]; then
              echo "::notice::${artifact} ${ver} already on Clojars; skipping"
            else
              echo "Deploying ${artifact} ${ver} (Clojars returned ${code})"
              (cd "$dir" && clojure -T:build deploy)
            fi
          }

          clojure -T:build install          # core -> ~/.m2 (companions resolve this)
          deploy_if_new psql-clj     .
          deploy_if_new psql-clj-gis modules/gis
          deploy_if_new psql-clj-aws modules/aws

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
