name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: "unit (jdk ${{ matrix.jdk }}, ${{ matrix.clojure }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['11', '17', '21']
        clojure: ['clojure-1-10', 'clojure-1-11', 'clojure-1-12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
          restore-keys: ${{ runner.os }}-m2-
      - name: core
        run: |
          lein with-profile +${{ matrix.clojure }} check
          lein with-profile +${{ matrix.clojure }} test
          lein install
      - name: gis
        working-directory: modules/gis
        run: |
          lein with-profile +${{ matrix.clojure }} check
          lein with-profile +${{ matrix.clojure }} test
      - name: aws
        working-directory: modules/aws
        run: |
          lein with-profile +${{ matrix.clojure }} check
          lein with-profile +${{ matrix.clojure }} test

  integration:
    name: integration (postgis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psql_clj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: psql_clj_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
          restore-keys: ${{ runner.os }}-m2-
      - name: core integration
        run: |
          lein install
          lein test :integration
      - name: gis integration
        working-directory: modules/gis
        run: lein test :integration
